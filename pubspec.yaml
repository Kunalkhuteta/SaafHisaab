name: saafhisaab
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Supabase - database + auth
  supabase_flutter: ^2.3.4
  
  # Firebase - OTP login + notifications  
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  
  # Camera + image
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  
  # ML Kit OCR - bill scanning
  google_mlkit_text_recognition: ^0.13.0
  
  # Share to WhatsApp
  share_plus: ^7.2.2
  
  # State management
  flutter_riverpod: ^2.5.1
  
  # Local storage - offline mode
  hive_flutter: ^1.1.0
  
  # Charts for dashboard
  fl_chart: ^0.67.0
  
  # PDF generation for reports
  pdf: ^3.10.8
  printing: ^5.12.0
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  
  # Razorpay payments
  razorpay_flutter: ^1.3.5
  
  # Icons
  cupertino_icons: ^1.0.6